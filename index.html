<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Level Test</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* Start screen */
#startScreen h2{ margin-top:0; }
#startScreen input{
display:block;
width:100%;
box-sizing:border-box;
margin:10px 0;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:6px;
}

#startBtn{
display:block;
width:100%;
box-sizing:border-box;
margin-top:12px;
padding:12px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:6px;
background:#4c7dff;
color:white;
}

#startBtn:disabled{
opacity:0.6;
cursor:not-allowed;
}

#startHint{
font-size:13px;
color:#666;
margin-top:8px;
}

/* Test */
.option{
display:block;
width:100%;
margin:10px 0;
padding:12px;
font-size:16px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<!-- Page 1: Start screen -->
<div id="startScreen">
  <h2>English Level Test</h2>
  <p>Enter your details to start:</p>
  <input id="studentName" type="text" placeholder="Student name" autocomplete="name" />
  <input id="studentPhone" type="tel" placeholder="Phone number" autocomplete="tel" inputmode="tel" />
  <button id="startBtn" type="button" disabled>Start test</button>
  <div id="startHint">Fill in both fields to enable the Start button.</div>
</div>

<!-- Page 2: Test screen -->
<h2 id="question" style="display:none;"></h2>
<div id="answers" style="display:none;"></div>

</div>

<script>

const questions = [

{q:"She ___ to the gym every morning.",options:["go","goes","going","gone"],answer:"goes",level:"A1"},
{q:"I have ___ my homework already.",options:["do","did","done","doing"],answer:"done",level:"A1"},
{q:"By next week, we ___ finished the project.",options:["will","will have","will have been","will be"],answer:"will have",level:"A1"},
{q:"If I ___ more time, I would travel around the world.",options:["have","had had","will have","had"],answer:"had",level:"A1"},
{q:"I saw ___ eagle flying over the mountains.",options:["a","an","the","no article"],answer:"an",level:"A1"},

{q:"She is very good ___ playing the piano.",options:["at","in","on","with"],answer:"at",level:"A2"},
{q:"This book is ___ than the one I read yesterday.",options:["more interesting","interestinger","most interesting","the interesting"],answer:"more interesting",level:"A2"},
{q:"You ___ wear a helmet while riding a bike.",options:["must","can","may","might"],answer:"must",level:"A2"},
{q:"Correct the mistake. He don’t like chocolate. ",options:["He not like chocolate.","He didn’t like chocolate.","He does not like chocolate.","He no likes chocolate."],answer:"He does not like chocolate.",level:"A2"},

{q:"If it ___ tomorrow, we will cancel the picnic.",options:["rains","rained","raining","will rain"],answer:"rains",level:"B1"},
{q:"I ___ my keys yesterday.",options:["lose","losing","had lost","lost"],answer:"lost",level:"B1"},
{q:"___ you ever visited London?",options:["Do","Had","Did","Have"],answer:"Have",level:"B1"},

{q:"Hardly ___ he arrived when it started raining.",options:["had","has","have","having"],answer:"had",level:"B2"},
{q:"She suggested ___ earlier.",options:["leaving","leave","to leave","left"],answer:"leaving",level:"B2"},
{q:"The letter ___ by Sarah yesterday.",options:["is written","was written","writes","wrote"],answer:"was written",level:"B2"},

{q:"The man ___ lives next door is a doctor.",options:["which","where","who","whom"],answer:"who",level:"B2"},
{q:"Happy → ___ (synonym)",options:["sad","joyful","angry","tired"],answer:"joyful",level:"B2"},
{q:"Hot → ___ (antonym)",options:["warm","boiling","freezing","sunny"],answer:"freezing",level:"B2"},
{q:"She is very ___. She makes friends easily.",options:["shy","a people person","rude","lonely"],answer:"a people person",level:"B2"},
{q:"The opposite of “difficult” is ___.",options:["hard","simple","tough","challenging"],answer:"simple",level:"B2"},
{q:"He is so arrogant. He must have _______him",options:["looked up","looked into","looked forward to","looked down on"],answer:"looked down on",level:"B2"},
{q:"He always tells the truth. He is very ___.",options:["dishonest","honest","rude","insecure"],answer:"honest",level:"B2"},
{q:"Make a ___",options:["living","work","shopping","cleaning"],answer:"living",level:"B2"},
{q:"She loves ___ a horse at weekends.",options:["driving","going by","riding","doing"],answer:"riding",level:"B2"},
{q:"“Extremely tired” → ___",options:["exhausted","energetic","lively","sleepy"],answer:"exhausted",level:"B2"},
{q:"To be very happy → ___ (synonym)",options:["a piece of cake","under the weather","it goes without saying","over the moon"],answer:"over the moon",level:"B2"},
{q:"I don’t like horror movies. They ___ me.",options:["frighten","amuse","bore","please"],answer:"frighten",level:"A1"},
{q:"Small → ___ (synonym)",options:["huge","tiny","enormous","tall"],answer:"tiny",level:"A1"},
{q:"She couldn’t come to the party because she was ___.",options:["sick","happy","excited","late"],answer:"sick",level:"A1"},
{q:"He’s very ___. He likes to show off his achievements.",options:["humble","boastful","modest","quiet"],answer:"boastful",level:"A1"},

]

function shuffle(array){

for(let i = array.length - 1; i > 0; i--){

let j = Math.floor(Math.random() * (i + 1))

let temp = array[i]
array[i] = array[j]
array[j] = temp

}

return array

}

let shuffledQuestions = shuffle(questions.slice())

let index = 0
let score = 0

function points(level){

if(level === "A1" || level === "A2") return 1
if(level === "B1" || level === "B2") return 2
if(level === "C1") return 3

return 0
}

function showQuestion(){

let q = shuffledQuestions[index]

/* FIX: real line break using <br> + innerHTML */
document.getElementById("question").innerHTML =
"Question " + (index+1) + " / " + shuffledQuestions.length + "<br>" + q.q

let answers = document.getElementById("answers")
answers.innerHTML = ""

let shuffledOptions = shuffle(q.options.slice())

shuffledOptions.forEach(opt => {

let btn = document.createElement("button")
btn.className = "option"
btn.innerText = opt

btn.onclick = function(){

if(opt === q.answer){
score += points(q.level)
}

index++

if(index < shuffledQuestions.length){
showQuestion()
}else{
finish()
}

}

answers.appendChild(btn)

})

}

function finish(){

let level = ""

if(score <= 10) level = "A1 Beginner"
else if(score <= 15) level = "A2 Elementary"
else if(score <= 20) level = "B1 Intermediate"
else if(score <= 25) level = "B2 Upper Intermediate"
else level = "C1 Advanced"

// Build Telegram share link (no tokens; works on GitHub Pages)
const studentNameValue = (document.getElementById("studentName")?.value || "").trim()
const studentPhoneValue = (document.getElementById("studentPhone")?.value || "").trim()

const shareText =
  (studentNameValue ? studentNameValue : "Student") + (studentPhoneValue ? (" | Phone: " + studentPhoneValue) : "") + "\n" +
  "Your score: " + score + "\n" +
  "Your level: " + level + "\n" +
  "Test: " + window.location.href

const telegramShareUrl =
  "https://t.me/share/url?url=" + encodeURIComponent(window.location.href) +
  "&text=" + encodeURIComponent(shareText)

document.querySelector(".container").innerHTML = `
<h2>Test completed</h2>
<p>${studentNameValue ? ("<b>" + studentNameValue + "</b>") : "<b>Student</b>"}</p>
${studentPhoneValue ? ("<p>Phone: " + studentPhoneValue + "</p>") : ""}
<p>Your score: ${score}</p>
<p>Your level: <b>${level}</b></p>

<a href="${telegramShareUrl}" target="_blank" rel="noopener noreferrer"
   style="display:block;text-align:center;margin-top:14px;padding:12px;border-radius:6px;background:#229ED9;color:#fff;text-decoration:none;">
  Send to Telegram
</a>
`

}

/* Start screen logic */

const nameInput = document.getElementById("studentName")
const phoneInput = document.getElementById("studentPhone")
const startBtn = document.getElementById("startBtn")

function updateStartBtn(){
  const n = nameInput.value.trim()
  const p = phoneInput.value.trim()
  startBtn.disabled = !(n.length > 0 && p.length > 0)
}

nameInput.addEventListener("input", updateStartBtn)
phoneInput.addEventListener("input", updateStartBtn)

startBtn.onclick = function(){

  document.getElementById("startScreen").style.display = "none"
  document.getElementById("question").style.display = "block"
  document.getElementById("answers").style.display = "block"

  showQuestion()
}

</script>

</body>
</html>
