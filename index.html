<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ДОДАНО: підтримка мобільних пристроїв -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English Level Test</title>

<style>
body{
font-family: Arial;
background:#f4f4f4;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.option{
display:block;
width:100%;
margin:10px 0;
padding:12px;
font-size:16px;
cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<h2 id="question"></h2>

<div id="answers"></div>

</div>

<script>

const questions = [

{q:"I ___ a student.",options:["am","is","are","be"],answer:"am",level:"A1"},
{q:"She ___ my friend.",options:["is","am","are","be"],answer:"is",level:"A1"},
{q:"They ___ in the park.",options:["are","is","am","be"],answer:"are",level:"A1"},
{q:"I ___ like pizza.",options:["do","does","did","doing"],answer:"do",level:"A1"},
{q:"We ___ happy today.",options:["are","is","am","be"],answer:"are",level:"A1"},

{q:"I have ___ apple.",options:["an","a","the","some"],answer:"an",level:"A2"},
{q:"He goes to school ___ bus.",options:["by","on","with","at"],answer:"by",level:"A2"},
{q:"She can ___ very well.",options:["sing","sings","singing","sang"],answer:"sing",level:"A2"},
{q:"I ___ never been to London.",options:["have","has","had","having"],answer:"have",level:"A2"},

{q:"If I ___ more time, I would travel.",options:["had","have","has","having"],answer:"had",level:"B1"},
{q:"She prefers tea ___ coffee.",options:["to","than","over","from"],answer:"to",level:"B1"},
{q:"He said he ___ busy yesterday.",options:["was","is","be","being"],answer:"was",level:"B1"},

{q:"Hardly ___ he arrived when it started raining.",options:["had","has","have","having"],answer:"had",level:"B2"},
{q:"She suggested ___ earlier.",options:["leaving","leave","to leave","left"],answer:"leaving",level:"B2"},
{q:"I wish I ___ more money.",options:["had","have","has","having"],answer:"had",level:"B2"},

{q:"Not only ___ she smart, but also very kind.",options:["is","was","be","are"],answer:"is",level:"C1"},
{q:"He behaves as if he ___ the boss.",options:["were","was","is","be"],answer:"were",level:"C1"},
{q:"I would rather you ___ here tomorrow.",options:["were","was","be","are"],answer:"were",level:"C1"}

]

function shuffle(array){

for(let i = array.length - 1; i > 0; i--){

let j = Math.floor(Math.random() * (i + 1))

let temp = array[i]
array[i] = array[j]
array[j] = temp

}

return array

}

let shuffledQuestions = shuffle(questions.slice())

let index = 0
let score = 0

function points(level){

if(level === "A1" || level === "A2") return 1
if(level === "B1" || level === "B2") return 2
if(level === "C1") return 3

return 0
}

function showQuestion(){

let q = shuffledQuestions[index]

// Нумерація + питання
document.getElementById("question").innerText =
"Question " + (index+1) + " / " + shuffledQuestions.length + "\n" + q.q

let answers = document.getElementById("answers")
answers.innerHTML = ""

let shuffledOptions = shuffle(q.options.slice())

shuffledOptions.forEach(opt => {

let btn = document.createElement("button")
btn.className = "option"
btn.innerText = opt

btn.onclick = function(){

if(opt === q.answer){
score += points(q.level)
}

index++

if(index < shuffledQuestions.length){
showQuestion()
}else{
finish()
}

}

answers.appendChild(btn)

})

}

function finish(){

let level = ""

if(score <= 10) level = "A1 Beginner"
else if(score <= 15) level = "A2 Elementary"
else if(score <= 20) level = "B1 Intermediate"
else if(score <= 25) level = "B2 Upper Intermediate"
else level = "C1 Advanced"

document.querySelector(".container").innerHTML = `
<h2>Test completed</h2>
<p>Your score: ${score}</p>
<p>Your level: <b>${level}</b></p>
`

}

showQuestion()

</script>

</body>
</html>
